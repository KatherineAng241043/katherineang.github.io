<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
</head>
<style>
    body {
        text-align: center;
        background-image: url('images/mark.jpg');
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 100px;
    }

    .card {
        width: 300px;
    }

    img {
        border-radius: 8px;
    }

    .card_content {
        position: relative;
        top: -60px;
        background-color: rgb(219, 209, 196);
        padding: 20px;
        width: 70%;
        margin: 0 auto;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    }

    .card_content p {
        color: #383838;
        font-weight: bold;
    }

    a {
        color: #0c6d19;
        text-decoration: none;
        font-weight: bold;
    }
</style>

<body>
    <div class="header">
        <h1>Caring is the new marketing</h1>
        <p>The Nexcent blog is the best place to read about the latest membership insights.</p>
    </div>

    <div class="container">
        <div class="card">
            <img src="images/200.jpg" alt="200" width="100%">
            <div class="card_content">
                <p>200-Minhyung's Version - Mark</p>
                <a href="https://youtu.be/SprSBq_wxBQ?si=y9NhLy_fINCJo9wX">Play</a>
            </div>
        </div>

        <div class="card">
            <img src="images/child.jpg" alt="child" width="100%">
            <div class="card_content">
                <p>Child - Mark</p>
                <a href="https://youtu.be/VbIf3z2SqHg?si=D0_HD6W3irL1Sae6">Play</a>
            </div>
        </div>

        <div class="card">
            <img src="images/the firstfruit.jpg" alt="the firstfruit" width="100%">
            <div class="card_content">
                <p>The Firstfruit-The 1st Album - Mark</p>
                <a href="https://youtu.be/GYyJUD6tcfk?si=CLXsmrwkhuZrsk9Q">Play</a>
            </div>
        </div>
    </div>
</body>

</html>
