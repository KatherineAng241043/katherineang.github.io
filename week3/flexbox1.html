<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
</head>
<style>
    body {
        background-color: #f9f6ed;
        margin: 150px 0px;
        font-family: Oxygen, sans-serif;
    }

    div.all {
        display: flex;
        gap: 20px;
        margin: auto;
        width: 1024px;

    }

    div.img {
        background-color: #FFFFFF;
        padding: 15px;
        border-radius: 15px;
    }

    h1 {
        font-size: 22px;
        margin-bottom: -3px;
    }

    p {
        font-size: 12px;
        line-height: 1.5;
    }

    div.all img {
        border-radius: 7px;
    }

    div.text {
        padding: 20px;
        margin-top: -13px;
    }
</style>


<body>
    <div class="all">
        <div class="img">
            <img src="images/residential projects.jpg" alt="r_projects" width="100%">
            <div class="text">
                <h1>Residential projects</h1>
                <p>We build sustainable and modem homes for <br />comfortable living.</p>
            </div>
        </div>
        <div class="img">
            <img src="images/commercial spaces.jpg" alt="c_spaces" width="100%">
            <div class="text">
                <h1>Commercial spaces</h1>
                <p>We create efficient, inspiring workspaces for <br />businesses of all sizes.</p>
            </div>
        </div>
        <div class="img">
            <img src="images/infrastructure works.jpg" alt="i_works" width="100%">
            <div class="text">
                <h1>Infrastructure works</h1>
                <p>We develop strong, reliable infrastructure for<br />growing communities.</p>
            </div>
        </div>
    </div>
</body>

</html>
